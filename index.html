<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Academy | Master the Agentic Economy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo-container" id="nav-logo-link" onclick="navigate('landing')">
            <img src="logo.png" alt="Arc Academy Logo" class="nav-logo">
            <span class="logo-text">ARC // ACADEMY</span>
        </div>

        <div class="wallet-wrapper">
            <div class="checkin-wrapper" id="checkin-trigger" onclick="toggleCheckinModal(true)">
                <span class="checkin-icon">📅</span>
                <div id="checkin-dot" class="notification-dot active"></div>
            </div>

            <button class="connect-btn-nav" id="wallet-btn" onclick="handleWalletAction()">
                <span id="btn-text">CONNECT WALLET</span>
            </button>

            <div id="profile-dropdown" class="dropdown-content">
                <div class="dropdown-header" style="color:var(--arc-purple); font-size:0.7rem; margin-bottom:10px; font-family:'Orbitron';">ARCHITECT_NODE</div>
                <a onclick="navigate('profile')">👤 VIEW PROFILE</a>
                <a onclick="navigate('dashboard')">🏆 MY PROGRESS</a>
                <hr style="border:0.5px solid var(--border); margin:10px 0;">
                <a onclick="disconnect()" style="color: #ff4d4d;">🚪 DISCONNECT</a>
            </div>
        </div>
    </nav>

    <section id="landing-screen" class="page-section active">
        <div class="hero-container" style="text-align: center;">
            <h1 class="hero-title" style="font-family: 'Orbitron'; font-size: 3rem; margin-bottom: 20px;">MASTER THE <br><span style="color: var(--arc-purple);">AGENTIC ECONOMY</span></h1>
            <button class="launch-btn" id="hero-launch-btn" onclick="navigate('dashboard')">LAUNCH APP</button>
            
            <div class="footer-social" style="margin-top: 60px;">
                <span style="font-size: 0.7rem; letter-spacing: 2px; color: rgba(255,255,255,0.4);">CONNECT WITH US</span><br>
                <a href="https://x.com/Zkfenrir" target="_blank" style="color: var(--arc-purple); text-decoration: none; font-family: 'Orbitron'; font-size: 0.9rem;">@Zkfenrir</a>
            </div>
        </div>
    </section>

    <section id="dashboard-screen" class="page-section">
        <div class="card" style="width: 90%; max-width: 800px; background: var(--glass); padding: 40px; border-radius: 12px; border: 1px solid var(--border);">
            <div class="dash-header">
                <h2 style="font-family: 'Orbitron'; margin-bottom: 10px;">ACADEMY_DASHBOARD</h2>
                <div class="stats-row" style="margin-bottom: 20px;">
                    <span style="font-size: 0.8rem; color: var(--arc-purple);">PROGRESS: <span id="overall-percent">0%</span></span>
                </div>
            </div>
            <div style="width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 30px;">
                <div id="progress-fill" style="width: 0%; height: 100%; background: var(--arc-purple); transition: 0.5s;"></div>
            </div>
            <div id="levels-grid" class="levels-grid"></div>
        </div>
    </section>

    <section id="profile-screen" class="page-section">
        <div class="card" style="width: 90%; max-width: 500px; background: var(--glass); padding: 30px; border-radius: 12px; border: 1px solid var(--border);">
            <h2 style="font-family: 'Orbitron'; margin-bottom: 20px;">ARCHITECT_PROFILE</h2>
            <div class="profile-form">
                <div class="input-group" style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 0.7rem; color: var(--arc-purple); margin-bottom: 5px;">DISPLAY_NAME</label>
                    <input type="text" id="display-name" placeholder="Enter username..." style="width:100%; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white;">
                </div>
                <div class="input-group" style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 0.7rem; color: var(--arc-purple); margin-bottom: 5px;">EMAIL_CONTACT</label>
                    <input type="email" id="email-contact" placeholder="architect@arc.network" style="width:100%; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white;">
                </div>
                <button class="launch-btn" onclick="saveProfileChanges()" style="width:100%; margin-top: 10px; background: var(--arc-purple); color: white;">SAVE CHANGES</button>
            </div>
            <button class="back-link" onclick="navigate('dashboard')" style="background: none; border: none; color: gray; cursor: pointer; margin-top: 20px; width: 100%;">← RETURN_TO_DASHBOARD</button>
        </div>
    </section>

    <div id="checkin-modal" class="modal-overlay" style="display:none;">
        <div class="card" style="background: var(--arc-blue); padding: 30px; border: 1px solid var(--arc-purple); border-radius: 12px; text-align: center;">
            <h2 style="font-family: 'Orbitron'; color: var(--arc-purple);">DAILY_PROTOCOL_SYNC</h2>
            <div class="checkin-grid" id="checkin-grid"></div>
            <button id="checkin-btn" class="launch-btn" onclick="processCheckIn()" style="width:100%; margin-top: 20px;">SIGN TRANSACTION</button>
            <button class="back-link" onclick="toggleCheckinModal(false)" style="margin-top: 15px; color: gray; background: none; border: none; cursor: pointer;">CLOSE</button>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay" style="display:none;">
        <div class="card" style="background: var(--arc-blue); padding: 30px; border: 1px solid var(--arc-purple); border-radius: 12px; text-align: center;">
            <h2 style="font-family: 'Orbitron'; color: var(--arc-purple); margin-bottom: 20px;">INITIALIZE_IDENTITY</h2>
            <button class="launch-btn" onclick="connectAndSign()" style="width:100%; margin-bottom: 15px; background: white; color: black;">CONNECT METAMASK</button>
            <input type="email" id="email-input" placeholder="architect@arc.network" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; margin-bottom: 10px;">
            <button class="launch-btn" onclick="handleEmailLogin()" style="width:100%; background: var(--arc-purple); color: white;">LOGIN WITH EMAIL</button>
            <button class="back-link" onclick="toggleLoginModal(false)" style="margin-top: 20px; color: gray; background: none; border: none; cursor: pointer;">CANCEL</button>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
