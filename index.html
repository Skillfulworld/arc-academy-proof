<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Academy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="auth-screen" class="screen active">
  <nav class="navbar">
    <div class="logo-text">ARC // ACADEMY</div>
    <button class="connect-btn-nav" onclick="connectWallet()">
      <span id="btn-text">CONNECT WALLET</span>
    </button>
  </nav>

  <div class="hero-container">
    <h1 class="hero-title">Master the <span class="accent">Agentic Economy</span></h1>
    <p class="hero-subtitle">
      The premier proof-of-learning protocol for the Arc Ecosystem. 
      Validate your expertise and earn your Architect credential.
    </p>
    <button class="launch-btn" onclick="showScreen('dashboard-screen'); renderDashboard();">
      LAUNCH APP
    </button>
  </div>
</div>

    <script src="app.js"></script>
</body>
</html>
