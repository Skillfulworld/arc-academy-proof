<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Academy | Agentic Economy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="auth-screen" class="screen active">
        <nav class="navbar">
            <div class="logo-text">ARC // ACADEMY</div>
            <button class="connect-btn-nav" onclick="connectWallet()">
                <span id="btn-text">CONNECT WALLET</span>
            </button>
        </nav>

        <div class="hero-container">
            <h1 class="hero-title">MASTER THE<span>AGENTIC ECONOMY</span></h1>
            <button class="launch-btn" onclick="showScreen('dashboard-screen'); renderDashboard();">
                LAUNCH APP
            </button>
        </div>

        <div class="footer-social">
            <span>CONNECT WITH US</span>
            <a href="https://x.com/Zkfenrir" target="_blank" class="social-link">
                @Zkfenrir
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
            </a>
        </div>
    </div>

    <div id="dashboard-screen" class="screen">
        <div class="card">
            <h2>DASHBOARD</h2>
            <div id="levels-grid"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
