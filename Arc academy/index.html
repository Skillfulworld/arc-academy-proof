<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Academy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="auth-screen" class="screen active">
        <h1 class="logo-text">ARC ACADEMY</h1>
        <p>Prove your mastery of the Agentic Economy.</p>
        <button class="connect-btn" id="connect-btn" onclick="connectWallet()">CONNECT WALLET</button>
        <div id="connect-spinner" style="display:none;">Connecting to Arc Mainnet...</div>
    </div>

    <div id="dashboard-screen" class="screen">
        <div class="card">
            <h2>DASHBOARD</h2>
            <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
            <div id="levels-grid"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
